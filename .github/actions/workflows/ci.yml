name: Benchmark CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies (CPU-safe)
        run: |
          python -m pip install --upgrade pip
          # Avoid huge CUDA wheels
          pip install torch==2.2.0+cpu torchvision==0.17.0+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu
          # Install rest without GPU-only deps
          grep -v "bitsandbytes" requirements.txt > req_ci.txt
          pip install -r req_ci.txt

      - name: Quick import test
        run: |
          python - <<'EOF'
          import torch
          print("Torch OK:", torch.__version__)
          EOF

      - name: Run results summary (no GPU)
        run: |
          python benchmark/summarise_results.py --results-dir results/

      - name: Verify expected outputs exist
        run: |
          python - <<'EOF'
          import os, sys

          expected = [
              "results/",
              "figures/",
              "benchmark/summarise_results.py"
          ]

          missing = [f for f in expected if not os.path.exists(f)]

          if missing:
              print("Missing files:")
              for f in missing:
                  print(" -", f)
              sys.exit(1)

          print("All required files exist ✓")
          EOF

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 \
            --show-source --statistics \
            --exclude=__pycache__,.git,results,figures,checkpoints
