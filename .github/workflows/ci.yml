name: Benchmark CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify repo structure
        run: |
          python - <<'EOF'
          import os, sys
          required = [
              "README.md",
              "requirements.txt",
              "configs",
              "experiments",
              "figures",
              "results",
              "src"
          ]
          missing = [p for p in required if not os.path.exists(p)]
          if missing:
              print("Missing:")
              for p in missing:
                  print(" -", p)
              sys.exit(1)
          print("Repo structure OK")
          EOF
