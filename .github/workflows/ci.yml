name: Benchmark CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn matplotlib pillow tqdm pyyaml

      - name: Verify repo structure
        run: |
          python - <<'EOF'
          import os, sys
          expected = [
              "README.md",
              "requirements.txt",
              "benchmark/summarise_results.py",
              "results"
          ]
          missing = [p for p in expected if not os.path.exists(p)]
          if missing:
              print("Missing required files:")
              for p in missing:
                  print(" -", p)
              sys.exit(1)
          print("Repo structure looks good.")
          EOF

      - name: Run lightweight summary
        run: |
          python benchmark/summarise_results.py --results-dir results/
